services:

  # ── Local AI services (swap for cloud by changing *_PROVIDER in .env) ────────

  stt:
    build: ./stt
    environment:
      WHISPER_MODEL: tiny
    ports:
      - "8000:8000"
    networks: [voiceai]
    restart: unless-stopped

  llm:
    build: ./llm
    environment:
      OLLAMA_MODEL: smollm2:135m
      OLLAMA_KEEP_ALIVE: -1   # keep model loaded in memory indefinitely
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks: [voiceai]
    restart: unless-stopped

  tts:
    build: ./tts
    ports:
      - "5001:5000"  # 5000 is reserved by macOS AirPlay
    networks: [voiceai]
    restart: unless-stopped

  # ── Voice agent ───────────────────────────────────────────────────────────────

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    env_file: .env
    ports:
      - "9099:9099"
    networks: [voiceai]
    depends_on: [stt, llm, tts]
    restart: unless-stopped

  # ── Asterisk PBX ──────────────────────────────────────────────────────────────

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: asterisk
    environment:
      # IP that baresip uses to reach Asterisk's RTP ports (Docker port mappings).
      # Defaults to 127.0.0.1 — works when baresip and Docker run on the same machine.
      # Override in .env if baresip is on a different host: ASTERISK_EXTERNAL_IP=192.168.x.x
      ASTERISK_EXTERNAL_IP: ${ASTERISK_EXTERNAL_IP:-127.0.0.1}
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf.tmpl:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/logger.conf:/etc/asterisk/logger.conf:ro
    networks: [voiceai]
    depends_on: [agent]
    restart: unless-stopped

networks:
  voiceai:
    driver: bridge

volumes:
  ollama_data:
