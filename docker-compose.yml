services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: voiceai
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceai_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config-api/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks: [voiceai]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [voiceai]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Config API + Admin UI ─────────────────────────────────────────────────────

  config-api:
    build: ./config-api
    container_name: config-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://voiceai:${POSTGRES_PASSWORD:-voiceai_dev}@postgres:5432/voiceai
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    networks: [voiceai]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Local AI services (swap for cloud via admin UI or .env) ───────────────────

  stt:
    build: ./stt
    environment:
      WHISPER_MODEL: tiny
    ports:
      - "8000:8000"
    networks: [voiceai]
    restart: unless-stopped

  llm:
    build: ./llm
    environment:
      OLLAMA_MODEL: smollm2:135m
      OLLAMA_KEEP_ALIVE: -1   # keep model loaded in memory indefinitely
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks: [voiceai]
    restart: unless-stopped

  tts:
    build: ./tts
    ports:
      - "5001:5000"  # 5000 is reserved by macOS AirPlay
    networks: [voiceai]
    restart: unless-stopped

  # ── Voice agent ───────────────────────────────────────────────────────────────

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CONFIG_API_URL: http://config-api:8080
      AGENT_SLUG: ${AGENT_SLUG:-basic}
    ports:
      - "9099:9099"
    networks: [voiceai]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-api:
        condition: service_started
      stt:
        condition: service_started
      llm:
        condition: service_started
      tts:
        condition: service_started
    restart: unless-stopped

  # ── Asterisk PBX ──────────────────────────────────────────────────────────────

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: asterisk
    environment:
      ASTERISK_EXTERNAL_IP: ${ASTERISK_EXTERNAL_IP:-127.0.0.1}
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf.tmpl:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/logger.conf:/etc/asterisk/logger.conf:ro
    networks: [voiceai]
    depends_on: [agent]
    restart: unless-stopped

networks:
  voiceai:
    driver: bridge

volumes:
  ollama_data:
  postgres_data:
  redis_data:
