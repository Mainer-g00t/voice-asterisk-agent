services:

  # ── Local AI services (swap for cloud by changing *_PROVIDER in .env) ────────

  stt:
    build: ./stt
    environment:
      WHISPER_MODEL: tiny
    networks: [voiceai]
    restart: unless-stopped

  llm:
    build: ./llm
    environment:
      OLLAMA_MODEL: smollm2:135m
    volumes:
      - ollama_data:/root/.ollama
    networks: [voiceai]
    restart: unless-stopped

  tts:
    build: ./tts
    networks: [voiceai]
    restart: unless-stopped

  # ── Voice agent ───────────────────────────────────────────────────────────────

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent
    env_file: .env
    ports:
      - "9099:9099"
    networks: [voiceai]
    depends_on: [stt, llm, tts]
    restart: unless-stopped

  # ── Asterisk PBX ──────────────────────────────────────────────────────────────

  asterisk:
    image: andrius/asterisk:18
    platform: linux/amd64
    container_name: asterisk
    ports:
      - "5060:5060/udp"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./asterisk/pjsip.conf:/etc/asterisk/pjsip.conf:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/logger.conf:/etc/asterisk/logger.conf:ro
    networks: [voiceai]
    depends_on: [agent]
    restart: unless-stopped

networks:
  voiceai:
    driver: bridge

volumes:
  ollama_data:
