; Auto-generated by config-api — do not edit manually.
; Edit routes in the admin UI and click Apply.

[from-softphone]
; Default catch-all
exten => _X.,1,NoOp(Default route → basic)
 same => n,Answer()
 same => n,Set(CALL_UUID=${SHELL(head -c 36 /proc/sys/kernel/random/uuid)})
 same => n,Set(CURL_RESULT=${CURL(http://config-api:8080/internal/calls/pre-register,caller_id=${CALLERID(num)}&did=_X.&call_uuid=${CALL_UUID})})
 same => n,AudioSocket(${CALL_UUID},agent-basic:9099)
 same => n,Hangup()

; ── Outbound calls (originated via API) ─────────────────────────────────────
[outbound-agent]
exten => s,1,NoOp(Outbound to ${DESTINATION} via agent-${AGENT_SLUG})
 same => n,Answer()
 same => n,Wait(1)
 same => n,AudioSocket(${CALL_UUID},agent-${AGENT_SLUG}:9099)
 same => n,Hangup()
