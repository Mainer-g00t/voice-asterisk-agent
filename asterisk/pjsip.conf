; ── Transport ─────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Docker NAT: tell Asterisk what IP to advertise in SDP so baresip can reach
; the RTP port mappings.  Update if your Mac's LAN IP changes:
;   macOS: ipconfig getifaddr en0
;   Linux: hostname -I | awk '{print $1}'
external_media_address=${ASTERISK_EXTERNAL_IP}
external_signaling_address=${ASTERISK_EXTERNAL_IP}
local_net=172.18.0.0/16   ; Docker bridge — use real IP for internal services

; ── AoR (address of record) ───────────────────────────────────────────────────
[softphone]
type=aor
max_contacts=1
remove_existing=yes

; ── Auth ──────────────────────────────────────────────────────────────────────
[softphone]
type=auth
auth_type=userpass
username=softphone
password=secret1234

; ── Endpoint ──────────────────────────────────────────────────────────────────
[softphone]
type=endpoint
context=from-softphone
disallow=all
allow=ulaw
allow=alaw
auth=softphone
aors=softphone
direct_media=no     ; keep Asterisk in the RTP path — required when running in Docker
rtp_symmetric=yes   ; send RTP back to the source address of received packets
force_rport=yes     ; use the port the SIP packet actually arrived from
