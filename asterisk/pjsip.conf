; ── Transport ─────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── AoR (address of record) ───────────────────────────────────────────────────
[softphone]
type=aor
max_contacts=1
remove_existing=yes

; ── Auth ──────────────────────────────────────────────────────────────────────
[softphone]
type=auth
auth_type=userpass
username=softphone
password=secret1234

; ── Endpoint ──────────────────────────────────────────────────────────────────
[softphone]
type=endpoint
context=from-softphone
disallow=all
allow=ulaw
allow=alaw
auth=softphone
aors=softphone
