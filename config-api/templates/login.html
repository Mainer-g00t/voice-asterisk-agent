<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Voice Agent Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .login-logo {
      font-size: 2.2rem;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="login-card card p-4 p-md-5">
    <div class="text-center mb-4">
      <div class="login-logo mb-2">🎙</div>
      <h5 class="fw-bold mb-0">Voice Agent Admin</h5>
      <div class="text-muted small mt-1">Sign in to continue</div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small mb-3">{{ error }}</div>
    {% endif %}

    {% if not auth_enabled %}
    <div class="alert alert-warning py-2 small mb-3">
      Auth is disabled — <code>ADMIN_PASSWORD</code> not set.
    </div>
    {% endif %}

    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control"
               autofocus autocomplete="current-password"
               {% if not auth_enabled %}placeholder="(any value — auth disabled)"{% endif %}>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>
</body>
</html>
