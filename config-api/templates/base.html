<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Voice Agent Admin{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    textarea.mono { font-family: monospace; font-size: 0.85rem; }
    .flash { animation: fadein 0.3s ease; }
    @keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3 mb-4">
    <a class="navbar-brand" href="/admin/routes">🎙 Voice Agent Admin</a>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="/admin/routes">📞 Routes</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/agents">🤖 Agents</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/tools">🔧 Tools</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/flows">🔀 Flows</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/calls">📋 Calls</a></li>
    </ul>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/docs" target="_blank">API Docs</a></li>
    </ul>
  </nav>
  <div class="container-xl">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
